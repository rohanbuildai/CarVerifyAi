name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: carverify_test
          MYSQL_USER: carverify
          MYSQL_PASSWORD: carverify_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: mysql://carverify:carverify_test@localhost:3306/carverify_test
      REDIS_URL: redis://localhost:6379
      SESSION_SECRET: ci-test-session-secret-1234567890abcdef
      CSRF_SECRET: ci-test-csrf-secret-1234567890
      RAZORPAY_KEY_ID: rzp_test_ci
      RAZORPAY_KEY_SECRET: ci_secret
      RAZORPAY_WEBHOOK_SECRET: ci_webhook
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate --schema=packages/db/prisma/schema.prisma
      - run: npx prisma migrate deploy --schema=packages/db/prisma/schema.prisma
      - run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate --schema=packages/db/prisma/schema.prisma
      - run: npm run build:backend
      - run: npm run build:worker

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/backend.Dockerfile
          push: false
          tags: carverify/backend:${{ github.sha }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/worker.Dockerfile
          push: false
          tags: carverify/worker:${{ github.sha }}
